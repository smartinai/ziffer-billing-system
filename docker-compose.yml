services:
  postgres:
    image: postgres:16-alpine
    container_name: ziffer-billing-postgres
    environment:
      POSTGRES_DB: ziffer_billing
      POSTGRES_USER: ziffer
      POSTGRES_PASSWORD: ziffer_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziffer -d ziffer_billing"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
